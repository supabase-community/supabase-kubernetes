static_resources:
  clusters:
    - name: studio
      connect_timeout: 5s
      type: STRICT_DNS
      dns_refresh_rate: 5s
      dns_failure_refresh_rate:
        base_interval: 1s
        max_interval: 1s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: studio
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: "${STUDIO_ADDRESS}"
                      port_value: 3000
      health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /project/default
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 10000
            max_pending_requests: 10000
            max_requests: 10000

  listeners:
    - name: studio_listener
      per_connection_buffer_limit_bytes: 32768
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                normalize_path: true
                merge_slashes: true
                path_with_escaped_slashes_action: REJECT_REQUEST
                use_remote_address: true
                common_http_protocol_options:
                  headers_with_underscores_action: REJECT_REQUEST
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format_source:
                          inline_string: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT% - - [%START_TIME(%d/%b/%Y:%H:%M:%S %z)%] \"%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %BYTES_SENT% \"%REQ(REFERER)%\" \"%REQ(USER-AGENT)%\"\n"
                route_config:
                  name: studio_route
                  virtual_hosts:
                    - name: studio_host
                      domains:
                        - "*"
                      cors:
                        allow_origin_string_match:
                          - safe_regex:
                              regex: ".*"
                        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD,CONNECT,TRACE"
                        allow_headers: "*"
                        expose_headers: "*"
                        max_age: "3600"
                      request_headers_to_add:
                        - header:
                            key: X-Forwarded-Host
                            value: "%REQ(:AUTHORITY)%"
                          append_action: ADD_IF_ABSENT
                        - header:
                            key: X-Forwarded-Port
                            value: "%DOWNSTREAM_LOCAL_PORT%"
                          append_action: ADD_IF_ABSENT
                      routes:
                        - match:
                            prefix: /api/mcp
                          route:
                            cluster: studio
                            timeout: 30s
                          request_headers_to_add:
                            - header:
                                key: X-Forwarded-Prefix
                                value: /api/mcp
                              append_action: ADD_IF_ABSENT
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: DENY
                                  policies:
                                    deny_all:
                                      permissions:
                                        - any: true
                                      principals:
                                        - any: true

                        - match:
                            prefix: /mcp
                          route:
                            cluster: studio
                            prefix_rewrite: /api/mcp
                            timeout: 30s
                          request_headers_to_add:
                            - header:
                                key: X-Forwarded-Prefix
                                value: /mcp
                              append_action: ADD_IF_ABSENT
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: DENY
                                  policies:
                                    deny_all:
                                      permissions:
                                        - any: true
                                      principals:
                                        - any: true

                        - match:
                            prefix: /
                          route:
                            cluster: studio
                            timeout: 30s
                          request_headers_to_remove:
                            - authorization
                          request_headers_to_add:
                            - header:
                                key: X-Forwarded-Prefix
                                value: /
                              append_action: ADD_IF_ABSENT
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    allow_all:
                                      permissions:
                                        - any: true
                                      principals:
                                        - any: true

                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors

                  - name: envoy.filters.http.basic_auth
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.basic_auth.v3.BasicAuth
                      users:
                        inline_string: "${DASHBOARD_BASIC_AUTH}"

                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

overload_manager:
  resource_monitors:
    - name: envoy.resource_monitors.global_downstream_max_connections
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.resource_monitors.downstream_connections.v3.DownstreamConnectionsConfig
        max_active_downstream_connections: 30000

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
