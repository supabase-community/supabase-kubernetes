    image: {{ . | quote }}
    {{- end }}
    {{- with .imagePullPolicy }}
    imagePullPolicy: {{ . | quote }}
    {{- end }}
    {{- with .affinity }}
    affinity:
      {{- toYaml . | nindent 6 }}
