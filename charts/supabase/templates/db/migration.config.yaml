{{- if and .Values.deployment.db.enabled (not .Values.migrationConfigRef) -}}
kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "supabase.db.fullname" . }}-migrations
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.migration | nindent 2 }}
{{- end }}
