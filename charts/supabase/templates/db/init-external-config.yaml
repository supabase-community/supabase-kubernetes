{{- if not .Values.deployment.db.enabled -}}
kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "supabase.fullname" . }}-db-init-external
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
data:
  00-initial-schema.sql: |{{ .Files.Get "files/db/initdb-external/00-initial-schema.sql" | nindent 4 }}
  01-auth-schema.sql: |{{ .Files.Get "files/db/initdb-external/01-auth-schema.sql" | nindent 4 }}
  02-storage-schema.sql: |{{ .Files.Get "files/db/initdb-external/02-storage-schema.sql" | nindent 4 }}
  03-realtime-schema.sql: |{{ .Files.Get "files/db/initdb-external/03-realtime-schema.sql" | nindent 4 }}
  04-grants.sql: |{{ .Files.Get "files/db/initdb-external/04-grants.sql" | nindent 4 }}
{{- end }}
