{{- if and (not .Values.deployment.db.enabled) .Values.externalDb.init.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "supabase.fullname" . }}-db-init
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-external-db
          image: "{{ .Values.image.initDb.repository }}:{{ .Values.image.initDb.tag }}"
          imagePullPolicy: {{ .Values.image.initDb.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e

              echo "Waiting for database to be ready..."
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER"; do
                echo "Database not ready, retrying in 2s..."
                sleep 2
              done

              CONNSTR="sslmode=${DB_SSL:-prefer} host=$DB_HOST port=$DB_PORT user=$DB_USER dbname=$DB_NAME"

              echo "Running Supabase init scripts against external database..."
              for f in /init-scripts/*.sql; do
                echo "=== Running $(basename $f) ==="
                PGPASSWORD="$DB_PASSWORD" psql "$CONNSTR" \
                  -v ON_ERROR_STOP=1 \
                  -v db_name="$DB_NAME" \
                  -v internal_db_name="_supabase" \
                  -v service_owner="supabase_admin" \
                  -v default_table_access_method="{{ .Values.externalDb.init.defaultTableAccessMethod }}" \
                  -v jwt_secret="$JWT_SECRET" \
                  -v jwt_exp="$JWT_EXP" \
                  -f "$f"
              done

              echo "Setting service role passwords and grants..."
              PGPASSWORD="$DB_PASSWORD" psql "$CONNSTR" \
                -v ON_ERROR_STOP=1 \
                -v db_password="$DB_PASSWORD" \
                -v db_name="$DB_NAME" <<'EOSQL'
              SELECT format('ALTER USER %I WITH PASSWORD %L', rolname, :'db_password')
              FROM pg_roles
              WHERE rolname IN (
                'authenticator',
                'supabase_auth_admin',
                'supabase_functions_admin',
                'supabase_storage_admin',
                'pgbouncer',
                'supabase_admin'
              ) \gexec

              SELECT format('GRANT CREATE ON DATABASE %I TO supabase_storage_admin', :'db_name')
              WHERE EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_storage_admin') \gexec

              SELECT format('GRANT CREATE ON DATABASE %I TO supabase_auth_admin', :'db_name')
              WHERE EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_auth_admin') \gexec
              EOSQL

              echo "=== External database initialization complete ==="
          env:
            {{- include "supabase.db.hostEnv" (dict "root" . "name" "DB_HOST") | nindent 12 }}
            {{- include "supabase.db.portEnv" (dict "root" . "name" "DB_PORT") | nindent 12 }}
            - name: DB_USER
              {{- if and .Values.secret.db.secretRef (hasKey (default (dict) .Values.secret.db.secretRefKey) "username") }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ index (default (dict) .Values.secret.db.secretRefKey) "username" }}
              {{- else }}
              value: "postgres"
              {{- end }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.password" . }}
            - name: DB_NAME
              {{- if and .Values.secret.db.secretRef (not (hasKey (default (dict) .Values.secret.db.secretRefKey) "database")) }}
              value: {{ .Values.secret.db.database | default "postgres" | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.database" . }}
              {{- end }}
            - name: DB_SSL
              value: {{ .Values.environment.auth.DB_SSL | default "prefer" | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt.name" . }}
                  key: {{ include "supabase.secret.jwt.key.secret" . }}
            - name: JWT_EXP
              value: {{ .Values.environment.db.JWT_EXP | default "3600" | quote }}
          volumeMounts:
            - name: init-scripts
              mountPath: /init-scripts
              readOnly: true
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "supabase.fullname" . }}-db-init-external
{{- end }}
