{{- if .Values.deployment.kong.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "supabase.kong.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.deployment.kong.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.kong.enabled }}
  replicas: {{ .Values.deployment.kong.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "supabase.kong.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "supabase.kong.selectorLabels" . | nindent 8 }}
      {{- with .Values.deployment.kong.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "supabase.kong.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.deployment.kong.automountServiceAccountToken }}
      restartPolicy: Always
      terminationGracePeriodSeconds: {{ .Values.deployment.kong.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.deployment.kong.podSecurityContext | nindent 8 }}
      {{- with .Values.image.kong.pullSecrets}}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.kong.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.kong.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.kong.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.kong.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: {{ include "supabase.kong.name" $ }}
          image: "{{ .Values.image.kong.repository }}:{{ .Values.image.kong.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.kong.pullPolicy }}
          command: ["/bin/bash"]
          args: ["/scripts/kong-entrypoint.sh"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- range $key, $value := .Values.environment.kong }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt.name" . }}
                  key: {{ include "supabase.secret.jwt.key.anonKey" . }}
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt.name" . }}
                  key: {{ include "supabase.secret.jwt.key.serviceKey" . }}
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.apikey.name" . }}
                  key: {{ include "supabase.secret.apikey.key.publishableKey" . }}
            - name: SUPABASE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.apikey.name" . }}
                  key: {{ include "supabase.secret.apikey.key.secretKey" . }}
            - name: ANON_KEY_ASYMMETRIC
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.apikey.name" . }}
                  key: {{ include "supabase.secret.apikey.key.anonKeyAsymmetric" . }}
            - name: SERVICE_ROLE_KEY_ASYMMETRIC
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.apikey.name" . }}
                  key: {{ include "supabase.secret.apikey.key.serviceRoleKeyAsymmetric" . }}
            {{- if .Values.secret.dashboard }}
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.dashboard.name" . }}
                  key: {{ include "supabase.secret.dashboard.key.username" . }}
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.dashboard.name" . }}
                  key: {{ include "supabase.secret.dashboard.key.password" . }}
            {{- end }}
          {{- with .Values.deployment.kong.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.kong.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /usr/local/kong/template.yml
              name: config
              subPath: template.yml
            - mountPath: /scripts
              name: wrapper
            {{- with .Values.deployment.kong.volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.deployment.kong.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.kong.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.kong.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.kong.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.deployment.kong.securityContext | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "supabase.kong.fullname" $ }}
            defaultMode: 0777
            items:
            - key: kong.yml
              path: template.yml
        - name: wrapper
          configMap:
            name: {{ include "supabase.kong.fullname" $ }}
            defaultMode: 0777
            items:
            - key: kong-entrypoint.sh
              path: kong-entrypoint.sh
        {{- with .Values.deployment.kong.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
