{{- if .Values.deployment.storage.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "supabase.storage.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.storage.enabled }}
  replicas: {{ .Values.deployment.storage.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "supabase.storage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.deployment.storage.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "supabase.storage.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Always
      {{- with .Values.image.storage.pullSecrets}}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "supabase.storage.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.deployment.storage.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-db
          image: "{{ .Values.image.initDb.repository }}:{{ .Values.image.initDb.tag }}"
          imagePullPolicy: {{ .Values.image.initDb.pullPolicy }}
          env:
            - name: DB_HOST
              {{- if .Values.deployment.db.enabled }}
              value: {{ include "supabase.db.fullname" . | quote }}
              {{- else if and .Values.secret.db.secretRef (hasKey (default (dict) .Values.secret.db.secretRefKey) "host") }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.host" . }}
              {{- else }}
              value: {{ .Values.environment.storage.DB_HOST | quote }}
              {{- end }}
            - name: DB_PORT
              {{- if and (not .Values.deployment.db.enabled) .Values.secret.db.secretRef (hasKey (default (dict) .Values.secret.db.secretRefKey) "port") }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.port" . }}
              {{- else }}
              value: {{ .Values.environment.storage.DB_PORT | quote }}
              {{- end }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until pg_isready -h $(DB_HOST) -p $(DB_PORT) -U postgres; do
              echo "Waiting for database to start..."
              sleep 2
              done
            - echo "Database is ready"
        {{- if .Values.deployment.minio.enabled }}
        - name: init-bucket
          image: "{{ .Values.image.minioClient.repository }}:{{ .Values.image.minioClient.tag }}"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.minio.name" . }}
                  key: {{ include "supabase.secret.minio.key.user" . }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.s3.secretRef }}
                  name: {{ include "supabase.secret.s3.name" . }}
                  key: {{ include "supabase.secret.s3.key.password" . }}
                  {{- else }}
                  name: {{ include "supabase.secret.minio.name" . }}
                  key: {{ include "supabase.secret.minio.key.password" . }}
                  {{- end }}
            - name: GLOBAL_S3_BUCKET
              value: {{ .Values.environment.storage.GLOBAL_S3_BUCKET }}
          imagePullPolicy: {{ .Values.image.minioClient.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              until /usr/bin/mc alias set supa-minio http://{{ include "supabase.minio.fullname" . }}:{{ .Values.service.minio.port }} $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do
                echo "Waiting for minio to start..."
                sleep 2
              done
              /usr/bin/mc mb --ignore-existing supa-minio/$GLOBAL_S3_BUCKET
        {{- end }}
        {{- if .Values.deployment.storage.extraInitContainers }}
          {{ .Values.deployment.storage.extraInitContainers | toYaml | nindent 8 }}
        {{- end }}
      containers:
        - name: {{ include "supabase.storage.name" $ }}
          securityContext:
            {{- toYaml .Values.deployment.storage.securityContext | nindent 12 }}
          image: "{{ .Values.image.storage.repository }}:{{ .Values.image.storage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.storage.pullPolicy }}
          env:
            {{- range $key, $value := .Values.environment.storage }}
            {{- if and (ne $key "AWS_ACCESS_KEY_ID") (ne $key "AWS_SECRET_ACCESS_KEY") (ne $key "STORAGE_BACKEND") (not (and (not $.Values.deployment.db.enabled) $.Values.secret.db.secretRef (or (and (eq $key "DB_HOST") (hasKey (default (dict) $.Values.secret.db.secretRefKey) "host")) (and (eq $key "DB_PORT") (hasKey (default (dict) $.Values.secret.db.secretRefKey) "port"))))) }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            
            # 2. Now handle STORAGE_BACKEND specifically
            - name: STORAGE_BACKEND
              value: {{ if hasKey .Values.environment.storage "STORAGE_BACKEND" -}}
                {{ index .Values.environment.storage "STORAGE_BACKEND" | quote }}
              {{- else if .Values.deployment.minio.enabled -}}
                "s3"
              {{- else -}}
                "file"
              {{- end }}

            {{- if or .Values.secret.s3.secretRef .Values.deployment.minio.enabled }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.s3.secretRef }}
                  name: {{ include "supabase.secret.s3.name" . | quote }}
                  key: {{ include "supabase.secret.s3.key.keyId" . | quote }}
                  {{- else }}
                  name: {{ include "supabase.secret.minio.name" . }}
                  key: {{ include "supabase.secret.minio.key.user" . }}
                  {{- end }}

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.s3.secretRef }}
                  name: {{ include "supabase.secret.s3.name" . | quote }}
                  key: {{ include "supabase.secret.s3.key.accessKey" . | quote }}
                  {{- else }}
                  name: {{ include "supabase.secret.minio.name" . }}
                  key: {{ include "supabase.secret.minio.key.password" . }}
                  {{- end }}
            {{- end }}

            {{- if .Values.deployment.db.enabled }}
            - name: DB_HOST
              value: {{ include "supabase.db.fullname" . }}
            {{- else if and .Values.secret.db.secretRef (hasKey (default (dict) .Values.secret.db.secretRefKey) "host") }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.host" . }}
            {{- end }}
            {{- if and (not .Values.deployment.db.enabled) .Values.secret.db.secretRef (hasKey (default (dict) .Values.secret.db.secretRefKey) "port") }}
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.port" . }}
            {{- end }}
            {{- if .Values.deployment.rest.enabled }}
            - name: POSTGREST_URL
              value: http://{{ include "supabase.rest.fullname" . }}:{{ .Values.service.rest.port }}
            {{- end }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.password" . }}
            - name: DB_PASSWORD_ENC
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.passwordEncoded" . }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db.name" . }}
                  key: {{ include "supabase.secret.db.key.database" . }}
            - name: DATABASE_URL
              value: $(DB_DRIVER)://$(DB_USER):$(DB_PASSWORD_ENC)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?search_path=auth&sslmode=$(DB_SSL)
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt.name" . }}
                  key: {{ include "supabase.secret.jwt.key.secret" . }}
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt.name" . }}
                  key: {{ include "supabase.secret.jwt.key.secret" . }}
            {{- if or .Values.secret.apikey.secretRef .Values.secret.apikey.jwtJwks }}
            - name: JWT_JWKS
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.apikey.name" . }}
                  key: {{ include "supabase.secret.apikey.key.jwtJwks" . }}
            {{- end }}
            - name: ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt.name" . }}
                  key: {{ include "supabase.secret.jwt.key.anonKey" . }}
            - name: SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt.name" . }}
                  key: {{ include "supabase.secret.jwt.key.serviceKey" . }}
            - name: S3_PROTOCOL_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.s3.name" . }}
                  key: {{ include "supabase.secret.s3.key.keyId" . }}
            - name: S3_PROTOCOL_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.s3.name" . }}
                  key: {{ include "supabase.secret.s3.key.accessKey" . }}
            {{- if .Values.deployment.imgproxy.enabled }}
            - name: IMGPROXY_URL
              value: http://{{ include "supabase.imgproxy.fullname" . }}:{{ .Values.service.imgproxy.port | int }}
            {{- end }}
              
            {{- if .Values.deployment.minio.enabled }}
            - name: GLOBAL_S3_ENDPOINT
              value: http://{{ include "supabase.minio.fullname" . }}:{{ default 9000 .Values.service.minio.port }}
            - name: GLOBAL_S3_PROTOCOl
              value: http
            - name: GLOBAL_S3_FORCE_PATH_STYLE
              value: "true"
            {{- end }}
          {{- with .Values.deployment.storage.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.storage.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          {{- with .Values.deployment.storage.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- with .Values.deployment.storage.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
            - mountPath: /var/lib/storage
              name: storage-data
      {{- with .Values.deployment.storage.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.storage.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.storage.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: storage-data
          {{- if .Values.persistence.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "supabase.pvc.name" (dict "root" $ "name" "storage") }}
          {{- else }}
          emptyDir:
            medium: ""
          {{- end }}
        {{- with .Values.deployment.storage.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
