{{- if .Values.secret.apikey }}
{{- if not .Values.secret.apikey.secretRef }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.secret.apikey" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
type: Opaque
data:
  supabasePublishableKey: {{ .Values.secret.apikey.supabasePublishableKey | default "" | toString | b64enc | quote }}
  supabaseSecretKey: {{ .Values.secret.apikey.supabaseSecretKey | default "" | toString | b64enc | quote }}
  anonKeyAsymmetric: {{ .Values.secret.apikey.anonKeyAsymmetric | default "" | toString | b64enc | quote }}
  serviceRoleKeyAsymmetric: {{ .Values.secret.apikey.serviceRoleKeyAsymmetric | default "" | toString | b64enc | quote }}
  jwtKeys: {{ .Values.secret.apikey.jwtKeys | default "" | toString | b64enc | quote }}
  jwtJwks: {{ .Values.secret.apikey.jwtJwks | default "" | toString | b64enc | quote }}
{{- end }}
{{- end }}
