{{- if not .Values.secret.dashboard.secretRef }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.secret.dashboard" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.secret.dashboard.username | b64enc | quote }}
  password: {{ .Values.secret.dashboard.password | b64enc | quote }}
  openAiApiKey: {{ .Values.secret.dashboard.openAiApiKey | b64enc | quote }}
{{- end }}
