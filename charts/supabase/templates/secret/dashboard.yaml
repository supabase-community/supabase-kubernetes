{{- define "supabase.secret.dashboard.name" -}}
{{- if .Values.secret.dashboard.secretRef -}}
{{- .Values.secret.dashboard.secretRef -}}
{{- else -}}
{{- include "supabase.secret.dashboard" . -}}
{{- end -}}
{{- end -}}

{{- define "supabase.secret.dashboard.key.username" -}}
{{- index (default (dict) .Values.secret.dashboard.secretRefKey) "username" | default "username" -}}
{{- end -}}

{{- define "supabase.secret.dashboard.key.password" -}}
{{- index (default (dict) .Values.secret.dashboard.secretRefKey) "password" | default "password" -}}
{{- end -}}

{{- define "supabase.secret.dashboard.key.openAiApiKey" -}}
{{- index (default (dict) .Values.secret.dashboard.secretRefKey) "openAiApiKey" | default "openAiApiKey" -}}
{{- end -}}

{{- if not .Values.secret.dashboard.secretRef }}
{{- $existing := dict }}
{{- if .Values.secret.preserveExisting }}
{{- $existing = (get (lookup "v1" "Secret" .Release.Namespace (include "supabase.secret.dashboard" .)) "data") | default dict }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.secret.dashboard" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- include "supabase.secret.keepAnnotation" . }}
type: Opaque
data:
  username: {{ get $existing "username" | default (.Values.secret.dashboard.username | b64enc) | quote }}
  password: {{ get $existing "password" | default (.Values.secret.dashboard.password | b64enc) | quote }}
  openAiApiKey: {{ get $existing "openAiApiKey" | default (.Values.secret.dashboard.openAiApiKey | b64enc) | quote }}
{{- end }}
