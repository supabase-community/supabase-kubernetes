{{- define "supabase.secret.realtime.name" -}}
{{- if .Values.secret.realtime.secretRef -}}
{{- .Values.secret.realtime.secretRef -}}
{{- else -}}
{{- include "supabase.secret.realtime" . -}}
{{- end -}}
{{- end -}}

{{- define "supabase.secret.realtime.key.secretKeyBase" -}}
{{- index (default (dict) .Values.secret.realtime.secretRefKey) "secretKeyBase" | default "secretKeyBase" -}}
{{- end -}}

{{- define "supabase.secret.realtime.key.dbEncKey" -}}
{{- index (default (dict) .Values.secret.realtime.secretRefKey) "dbEncKey" | default "dbEncKey" -}}
{{- end -}}

{{- if not .Values.secret.realtime.secretRef }}
{{- $existing := dict }}
{{- if .Values.secret.preserveExisting }}
{{- $existing = (get (lookup "v1" "Secret" .Release.Namespace (include "supabase.secret.realtime" .)) "data") | default dict }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.secret.realtime" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- include "supabase.secret.keepAnnotation" . }}
type: Opaque
data:
  secretKeyBase: {{ get $existing "secretKeyBase" | default (.Values.secret.realtime.secretKeyBase | b64enc) | quote }}
  dbEncKey: {{ get $existing "dbEncKey" | default (.Values.secret.realtime.dbEncKey | b64enc) | quote }}
{{- end }}
