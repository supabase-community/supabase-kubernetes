apiVersion: core.supabase.io/v1alpha1
kind: Project
metadata:
  labels:
    app.kubernetes.io/name: supabase-operator
    app.kubernetes.io/managed-by: kustomize
  name: project-sample
spec:
  version: "2026.04.27"

  global:
    siteUrl: "https://supabase.example.com"
    jwtExpirySeconds: 1800

  http:
    api:
      protocol: "https"
      hostname: "api.supabase.local"
    studio:
      protocol: "https"
      hostname: "studio.supabase.local"

  gateway:
    api:
      name: "gw"
      namespace: "envoy-gateway-system"
    studio:
      name: "gw"
      namespace: "envoy-gateway-system"

  database:
    host: "postgres.db.svc.cluster.local"
    passwordRef:
      name: supabase-db-credentials
      key: password
