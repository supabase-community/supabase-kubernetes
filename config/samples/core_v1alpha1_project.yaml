apiVersion: core.supabase.io/v1alpha1
kind: Project
metadata:
  labels:
    app.kubernetes.io/name: supabase-operator
    app.kubernetes.io/managed-by: kustomize
  name: supabase
spec:
  version: "2026.04.27"

  global:
    siteUrl: "https://supabase.example.com"
    jwtExpirySeconds: 1800

  http:
    api:
      protocol: "http"
      hostname: "api.supabase.local"
      serviceType: ClusterIP
    studio:
      protocol: "http"
      hostname: "studio.supabase.local"
      serviceType: ClusterIP

  databaseRef:
    kind: SingleDatabase
    name: supabase
