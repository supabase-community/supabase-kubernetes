---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.supabase.io
  resources:
  - auths
  - meta
  - migrations
  - projects
  - realtimes
  - rests
  - singledatabases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.supabase.io
  resources:
  - auths/status
  - meta/status
  - migrations/status
  - projects/status
  - realtimes/status
  - rests/status
  - singledatabases/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - core.supabase.io
  resources:
  - migrations/finalizers
  - projects/finalizers
  - singledatabases/finalizers
  verbs:
  - update
